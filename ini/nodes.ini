; --- SENSOR NODE EXAMPLE (Generic) ---
[env:sensor_node]
board = esp32dev 
build_src_filter = -<*> +<nodes/sensor_node.example.cpp>

; --- GENERIC ESP32 NODE (4MB) ---
[env:sensor_node_esp32]
board = esp32dev
board_build.flash_size = 4MB
board_build.flash_mode = qio
board_build.flash_freq = 80m
board_build.partitions = min_spiffs.csv
board_upload.speed = 921600
build_flags =
    -D ARDUINO_EVENT_RUNNING_CORE=1
    -D ARDUINO_RUNNING_CORE=1
build_src_filter = -<*> +<nodes/sensor_node.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
lib_ignore =
    ${common_libs.lib_deps_ignore}

; --- SENSOR NODE LILYGO T8 S3 ---
[env:sensor_node_t8_s3]
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/t8_s3_16mb.csv
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
build_src_filter = -<*> +<nodes/sensor_node.cpp>
lib_deps = 
    ${common_libs.lib_deps_sensor_node}
lib_ignore = 
    ${common_libs.lib_deps_ignore}

; --- ESP32-C6 SENSOR NODE ---
[env:sensor_node_c6]
board = esp32-c6-devkitc-1
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
build_src_filter = -<*> +<nodes/sensor_node.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
lib_ignore =
    ${common_libs.lib_deps_ignore}

; --- WEMOS D1 SHT30 SENSOR ---
[env:sensor_wemos_d1]
platform = espressif8266
board = d1
board_build.flash_size = 4MB
board_build.ldscript = eagle.flash.4m3m.ld
board_upload.speed = 460800
board_build.f_cpu = 80000000L
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -D HAS_SHT30
    -D HAS_DISPLAY_SHIELD
build_src_filter = -<*> +<nodes/wemos_sht30.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
    adafruit/Adafruit SHT31 Library
    olikraus/U8g2
lib_ignore =
    ${common_libs.lib_deps_ignore}

; --- ESP8266 DISPLAY GATEWAY (Now a Node) ---
[env:gateway_esp8266]
platform = espressif8266
board = nodemcuv2
build_src_filter = -<*> +<nodes/gateway.cpp>
lib_deps = 
    ${common_libs.lib_deps_esp8266}
lib_ignore = 
    ${common_libs.lib_deps_ignore}