[platformio]
default_envs = coordinator_c6

; --- GLOBAL CONFIGURATION ---
; We define common libraries and ignored libraries in separate sections to avoid duplication across different environments. Each environment can then reference these common settings, making it easier to maintain and update the library dependencies in one place.
[env]
framework = arduino
monitor_speed = 115200
; Use the pioarduino fork for all ESP32 variants to ensure C6/RISC-V support
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip

; --- LIBRARY DEPENDENCIES ---
[common_libs]
; These libraries are common to all ESP32 variants (coordinator and sensor node), but not needed for the ESP8266 display gateway
lib_deps_common =
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8
    mathieucarbou/ESP Async WebServer
	mathieucarbou/AsyncTCP
; These libraries are needed for the sensor node, but not for the coordinator (since the coordinator doesn't have any sensors attached to it)
lib_deps_sensor_node = 
    bblanchon/ArduinoJson @ ^7.0.4
    ; adafruit/Adafruit GFX Library @ ^1.11.9
    ; adafruit/Adafruit SSD1306 @ ^2.5.9

; The ESP8266 has some additional libraries for the display gateway
lib_deps_esp8266 = 
    bblanchon/ArduinoJson @ ^7.0.4
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
; We ignore the Async TCP library for the ESP8266 environment since it's not compatible with that platform, and we don't need it for the display gateway
lib_deps_ignore = 
	Async TCP

; --- 1. COORDINATOR ---
; The ESP32-C6 DevKitC-1 has 4MB flash and no PSRAM, but it supports USB CDC for serial communication, so we enable that in the build flags
[env:coordinator_c6]
board = esp32-c6-devkitc-1
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D HAS_RGB_LED
build_src_filter = +<coordinator.cpp> +<web/web.cpp> -<sensor_node.example.cpp> -<gateway.cpp> -<relay.cpp>
    +<eth.cpp>
lib_deps = 
    ${common_libs.lib_deps_common}
    adafruit/Adafruit NeoPixel @ ^1.12.3
lib_ignore = 
    ${common_libs.lib_deps_ignore}

;Lilygo T8 S3 has 16MB flash and PSRAM.
[env:coordinator_t8_s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/t8_s3_16mb.csv
build_flags =
    -D BOARD_HAS_PSRAM
build_src_filter = +<coordinator.cpp> +<web/web.cpp> -<sensor_node.example.cpp> -<gateway.cpp> -<relay.cpp>
lib_deps =
    ${common_libs.lib_deps_common}
lib_ignore =
    ${common_libs.lib_deps_ignore}

;Lilygo ETH Elite has 16MB flash and PSRAM.
[env:coordinator_eth_elite]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/ethelite_16MB.csv
build_flags =
    -D BOARD_HAS_PSRAM
    -D LILYGO_T_ETH_ELITE
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D MESH_HOSTNAME=\"universalmesh\"
    -D OTA_PASSWORD=\"mesh1234\"
build_src_filter = +<coordinator.cpp> +<web/web.cpp> +<eth.cpp> -<sensor_node.example.cpp> -<gateway.cpp> -<relay.cpp>
lib_deps =
    ${common_libs.lib_deps_common}
lib_ignore =
    ${common_libs.lib_deps_ignore}

[env:coordinator_eth_elite_ota]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/ethelite_16MB.csv
build_flags =
    -D BOARD_HAS_PSRAM
    -D LILYGO_T_ETH_ELITE
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D MESH_HOSTNAME=\"universalmesh\"
    -D OTA_PASSWORD=\"mesh1234\"
build_src_filter = +<coordinator.cpp> +<web/web.cpp> +<eth.cpp> -<sensor_node.example.cpp> -<gateway.cpp> -<relay.cpp>
lib_deps =
    ${common_libs.lib_deps_common}
lib_ignore =
    ${common_libs.lib_deps_ignore}
upload_port = 192.168.2.204
upload_protocol = espota
upload_flags = --auth=mesh1234  ; keep in sync with OTA_PASSWORD above

; The standard ESP32-S3 DevKitC-1 has 4MB flash and no PSRAM.
[env:coordinator_s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
build_src_filter = +<coordinator.cpp> +<web/web.cpp> -<sensor_node.example.cpp> -<gateway.cpp> -<relay.cpp>
lib_deps = 
    ${common_libs.lib_deps_common}
lib_ignore = 
    ${common_libs.lib_deps_ignore}


; --- 2. SENSOR NODE (Generic ESP32) ---
[env:sensor_node]
board = esp32dev 
build_src_filter = +<sensor_node.example.cpp> -<coordinator.cpp> -<gateway.cpp> -<relay.cpp>

; Generic ESP32 Dev Module — 4MB flash, no PSRAM, CP2102 USB-UART
[env:sensor_node_esp32]
board = esp32dev
board_build.flash_size = 4MB
board_build.flash_mode = qio
board_build.flash_freq = 80m
board_build.partitions = min_spiffs.csv
board_upload.speed = 921600
build_flags =
    -D ARDUINO_EVENT_RUNNING_CORE=1
    -D ARDUINO_RUNNING_CORE=1
build_src_filter = +<sensor_node.cpp> -<coordinator.cpp> -<gateway.cpp> -<relay.cpp>
lib_deps =
    ${common_libs.lib_deps_sensor_node}
lib_ignore =
    ${common_libs.lib_deps_ignore}

;Lilygo T8 S3 has 16MB flash and PSRAM.
[env:sensor_node_t8_s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions/t8_s3_16mb.csv
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
build_src_filter = +<sensor_node.cpp> -<coordinator.cpp> -<gateway.cpp> -<relay.cpp>
lib_deps = 
    ${common_libs.lib_deps_sensor_node}
lib_ignore = 
    ${common_libs.lib_deps_ignore}



; --- 3. DISPLAY GATEWAY (ESP8266) ---
[env:gateway_esp8266]
platform = espressif8266
board = nodemcuv2
build_src_filter = +<gateway.cpp> -<coordinator.cpp> -<sensor_node.example.cpp> -<relay.cpp>
lib_deps = 
    ${common_libs.lib_deps_esp8266}
lib_ignore = 
    ${common_libs.lib_deps_ignore}

