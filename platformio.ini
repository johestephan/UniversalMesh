; --- 2. SENSOR NODE (Generic ESP32) ---
[env:sensor_node]
board = esp32dev 
build_src_filter = +<sensor_node.example.cpp> -<coordinator.cpp> -<gateway.cpp> -<relay.cpp>

; --- 3. DISPLAY GATEWAY (ESP8266) ---
[env:gateway_esp8266]
platform = espressif8266
board = nodemcuv2
build_src_filter = +<gateway.cpp> -<coordinator.cpp> -<sensor_node.example.cpp> -<relay.cpp>
lib_deps = 
    ${common_libs.lib_deps_esp8266}
lib_ignore = 
    ${common_libs.lib_deps_ignore}

