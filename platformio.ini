[platformio]
default_envs = coordinator_c6

; --- GLOBAL CONFIGURATION ---
[env]
framework = arduino
monitor_speed = 115200
; Use the pioarduino fork for all ESP32 variants to ensure C6/RISC-V support
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
lib_deps = 
    bblanchon/ArduinoJson @ ^7.0.4

; --- 1. COORDINATOR (ESP32-C6) ---
[env:coordinator_c6]
board = esp32-c6-devkitc-1
build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
build_src_filter = +<coordinator.cpp> -<sensor_node.example.cpp> -<gateway.cpp> -<relay.cpp>
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit NeoPixel @ ^1.12.3

; --- 2. SENSOR NODE (Generic ESP32) ---
[env:sensor_node]
board = esp32dev 
build_src_filter = +<sensor_node.example.cpp> -<coordinator.cpp> -<gateway.cpp> -<relay.cpp>

; --- 3. DISPLAY GATEWAY (ESP8266) ---
[env:gateway_esp8266]
platform = espressif8266
board = nodemcuv2
build_src_filter = +<gateway.cpp> -<coordinator.cpp> -<sensor_node.example.cpp> -<relay.cpp>
lib_deps = 
    ${env.lib_deps}
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9