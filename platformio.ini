; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Choose which environment to build by default if none is specified
default_envs = relay_esp32

; ----------------------------------------------------------------------
; 1. MASTER API INJECTOR (ESP32-C6)
; ----------------------------------------------------------------------
[env:master_c6]
; Use the pioarduino fork to force ESP32-C6 Arduino support
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

build_src_filter = +<master.cpp> -<gateway.cpp> -<relay.cpp>

lib_deps = 
    bblanchon/ArduinoJson @ ^7.0.4

; ----------------------------------------------------------------------
; 2. DUMMY / RELAY NODE (Generic ESP32)
; ----------------------------------------------------------------------
[env:relay_esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; No external libraries needed, just the core ESP-NOW and our UniversalMesh lib

; ----------------------------------------------------------------------
; 3. DISPLAY GATEWAY (ESP8266 HW364A)
; ----------------------------------------------------------------------
[env:gateway_esp8266]
platform = espressif8266
board = nodemcuv2 ; Standard profile for ESP-12E/F based boards like the HW364A
framework = arduino
monitor_speed = 115200
build_src_filter = +<gateway.cpp> -<master.cpp> -<relay.cpp>
; Required for the OLED Screen
lib_deps = 
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9